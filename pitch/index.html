<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pitch Ear Training — Nashville Numbers</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <style>
    /* ── Pitch-page-specific styles ── */

    .pitch-header {
      width: 100%;
      max-width: 700px;
      margin-bottom: 24px;
      text-align: center;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      margin-bottom: 20px;
      transition: color 0.15s;
    }

    .back-link:hover { color: var(--accent); }

    .pitch-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(36px, 7vw, 60px);
      letter-spacing: 3px;
      color: var(--accent);
      text-shadow: 4px 4px 0 #8a6e00;
      line-height: 1;
    }

    .pitch-subtitle {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 6px;
    }

    /* Settings */
    .pitch-settings {
      width: 100%;
      max-width: 700px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 18px 24px;
      margin-bottom: 20px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    /* Difficulty pills */
    .difficulty-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .diff-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: #fff;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }

    .diff-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
      font-weight: 600;
    }

    /* Score bar (reuse .scorebar from style.css) */

    /* Play button */
    .play-note-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      max-width: 700px;
      background: var(--surface);
      border: 2px solid var(--accent);
      border-radius: 6px;
      color: var(--accent);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 3px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: 20px;
    }

    .play-note-btn:hover {
      background: var(--accent);
      color: #000;
    }

    .play-note-btn.playing {
      background: var(--accent);
      color: #000;
      animation: pulse 0.6s ease infinite alternate;
    }

    @keyframes pulse {
      from { box-shadow: 0 0 0 0 rgba(245,200,66,0.4); }
      to   { box-shadow: 0 0 0 12px rgba(245,200,66,0); }
    }

    .play-icon { font-size: 28px; }

    /* Quiz card reuse */

    /* Answer grid for multiple choice — 3 or 4 wide */
    .pitch-choices {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 4px;
    }

    @media (max-width: 480px) {
      .pitch-choices { grid-template-columns: repeat(2, 1fr); }
    }

    .pitch-choice-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 18px;
      font-weight: 600;
      padding: 18px 10px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 1px;
      text-align: center;
    }

    .pitch-choice-btn:hover:not(:disabled) {
      border-color: var(--accent);
      background: #242200;
      transform: translateY(-1px);
    }

    .pitch-choice-btn.correct {
      background: #0d2b1a;
      border-color: var(--correct);
      color: var(--correct);
    }

    .pitch-choice-btn.wrong {
      background: #2b0d0d;
      border-color: var(--wrong);
      color: var(--wrong);
    }

    /* Type input (reuses .type-input-row from style.css) */

    /* Answer mode toggle */
    .answer-mode-tabs {
      display: flex;
      width: 100%;
      margin-bottom: 16px;
      border-radius: 5px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .answer-mode-tab {
      flex: 1;
      background: var(--surface);
      border: none;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 9px 6px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }

    .answer-mode-tab + .answer-mode-tab {
      border-left: 1px solid var(--border);
    }

    .answer-mode-tab.active {
      background: var(--accent);
      color: #000;
      font-weight: 600;
    }

    /* Result piano */
    .result-piano-wrap {
      margin-top: 20px;
      display: none;
    }

    .result-piano-wrap.show { display: block; }

    .result-piano-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .pitch-piano-svg {
      display: block;
      width: 100%;
      max-width: 520px;
      height: auto;
      min-width: 280px;
    }

    /* Training mode toggle */
    .train-mode-tabs {
      display: flex;
      width: 100%;
      max-width: 700px;
      margin-bottom: 16px;
      border-radius: 5px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .train-mode-tab {
      flex: 1;
      background: var(--surface);
      border: none;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 10px 6px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }

    .train-mode-tab + .train-mode-tab { border-left: 1px solid var(--border); }

    .train-mode-tab.active {
      background: var(--accent);
      color: #000;
      font-weight: 600;
    }

    /* Sequence display */
    .sequence-display {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
      align-items: center;
      justify-content: center;
      min-height: 52px;
    }

    .seq-note {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .seq-note-bubble {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      font-weight: 600;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 8px 12px;
      color: var(--text);
      transition: all 0.2s;
      min-width: 48px;
      text-align: center;
    }

    .seq-note-bubble.playing {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
      transform: translateY(-3px);
      box-shadow: 0 4px 12px rgba(245,200,66,0.3);
    }

    .seq-note-bubble.mystery {
      background: #1a1a1a;
      border: 2px dashed var(--accent);
      color: var(--accent);
      font-size: 20px;
    }

    .seq-note-bubble.mystery.playing {
      background: var(--accent);
      color: #000;
    }

    .seq-note-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      letter-spacing: 1px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .seq-arrow {
      font-size: 16px;
      color: var(--border);
      padding: 0 2px;
      align-self: center;
      margin-bottom: 14px;
    }

    /* Context refs count badge */
    .refs-count-badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 12px;
    }

    .refs-count-badge span { color: var(--accent); }

    /* Replay sequence button */
    .replay-seq-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 10px;
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: 16px;
    }

    .replay-seq-btn:hover { border-color: var(--accent); color: var(--accent); }
    .replay-seq-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>

  <div class="pitch-header">
    <a href="/" class="back-link">← Back to Nashville Quiz</a>
    <div class="pitch-logo">Pitch Ear Training</div>
    <div class="pitch-subtitle">Identify the note you hear</div>

    <div class="scorebar" style="margin-top:18px;">
      <div class="score-pill">
        <span>Score</span>
        <span class="val" id="ptScoreVal">0</span>
      </div>
      <div class="score-pill">
        <span>Total</span>
        <span class="val" id="ptTotalVal">0</span>
      </div>
      <div class="score-pill streak">
        <span>Streak</span>
        <span class="val" id="ptStreakVal">0</span>🔥
      </div>
      <div class="score-pill">
        <span>Accuracy</span>
        <span class="val" id="ptAccVal">—</span>
      </div>
    </div>
  </div>

  <!-- Training Mode Toggle -->
  <div class="train-mode-tabs">
    <button class="train-mode-tab active" id="tmtSingle" onclick="setTrainMode('single')">Single Note</button>
    <button class="train-mode-tab" id="tmtSequence" onclick="setTrainMode('sequence')">Note in Context</button>
  </div>

  <!-- Settings -->
  <div class="pitch-settings">
    <div class="setting-group">
      <label>Difficulty</label>
      <div class="difficulty-row" id="diffRow">
        <button class="diff-btn active" data-diff="natural" onclick="setDifficulty('natural', this)">Easy</button>
        <button class="diff-btn" data-diff="sharps" onclick="setDifficulty('sharps', this)">Medium</button>
        <button class="diff-btn" data-diff="all" onclick="setDifficulty('all', this)">Hard</button>
      </div>
      <div id="diffHint" style="font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--muted);margin-top:8px;">
        Natural notes · 5 reference notes in context mode
      </div>
    </div>
    <div class="setting-group">
      <label>Octave Range</label>
      <select id="octaveRange" onchange="newPitchQuestion()">
        <option value="4">Octave 4 only</option>
        <option value="45" selected>Octaves 4 & 5</option>
        <option value="345">Octaves 3, 4 & 5</option>
      </select>
    </div>
  </div>

  <!-- Progress bar -->
  <div class="progress-wrap" style="width:100%;max-width:700px;margin-bottom:16px;">
    <div class="progress-bar" id="ptProgressBar" style="width:0%"></div>
  </div>

  <!-- Sticky Play + Next bar -->
  <div style="position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--bg);border-top:1px solid var(--border);padding:12px 16px;display:flex;gap:10px;max-width:700px;margin:0 auto;">
    <!-- Single note play button -->
    <button class="play-note-btn" id="playNoteBtn" onclick="replayNote()" style="flex:1;margin-bottom:0;padding:14px 10px;font-size:18px;">
      <span class="play-icon">♪</span>
      <span id="playBtnLabel">Play Note</span>
    </button>
    <!-- Sequence play button (hidden in single mode) -->
    <button class="play-note-btn" id="playSeqBtn" onclick="replaySequence()" style="flex:1;margin-bottom:0;padding:14px 10px;font-size:18px;display:none;">
      <span class="play-icon">♪</span>
      <span id="playSeqBtnLabel">Play Sequence</span>
    </button>
    <!-- Next Note always visible, dims until answered -->
    <button class="next-btn" id="ptNextBtnTop" onclick="newPitchQuestion()"
      style="flex:1;margin:0;opacity:0.35;pointer-events:none;justify-content:center;padding:14px 10px;font-size:18px;">
      Next →
    </button>
  </div>
  <!-- Spacer so sticky bar doesn't overlap content -->
  <div style="height:80px;width:100%;max-width:700px;"></div>

  <!-- Quiz Card -->
  <div class="quiz-card" id="ptCard" style="width:100%;max-width:700px;">
    <div class="question-meta">
      <span class="question-type" id="ptQType">IDENTIFY THE NOTE</span>
      <span id="ptQCount">Q 1</span>
    </div>

    <!-- Answer mode toggle -->
    <div class="answer-mode-tabs">
      <button class="answer-mode-tab active" id="amtMultiple" onclick="setAnswerMode('multiple')">Multiple Choice</button>
      <button class="answer-mode-tab" id="amtType" onclick="setAnswerMode('type')">Type Answer</button>
    </div>

    <!-- Sequence display (only shown in context mode) -->
    <div id="seqDisplayWrap" style="display:none;">
      <div class="refs-count-badge" id="refsCountBadge"></div>
      <div class="sequence-display" id="seqDisplay"></div>
    </div>

    <div id="ptAnswerArea"></div>

    <!-- Feedback -->
    <div class="feedback" id="ptFeedback">
      <div class="correct-answer" id="ptFeedbackAnswer"></div>
      <div class="explanation" id="ptFeedbackExpl"></div>
    </div>

    <!-- Piano result -->
    <div class="result-piano-wrap" id="resultPianoWrap">
      <div class="result-piano-label">Note on keyboard — click a key to hear it</div>
      <div id="resultPianoSVG"></div>
    </div>

    <button class="next-btn" id="ptNextBtn" onclick="newPitchQuestion()">Next Note →</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <script src="pitch.js"></script>
</body>
</html>
